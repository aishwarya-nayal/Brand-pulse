<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand-Pulse</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ff6b35, #f7c59f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: #888;
            margin-bottom: 3rem;
            font-size: 1rem;
        }

        form {
            display: flex;
            gap: 0.75rem;
            width: 100%;
            max-width: 500px;
        }

        input[type="text"] {
            flex: 1;
            padding: 0.85rem 1.25rem;
            border-radius: 10px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }

        input[type="text"]:focus {
            border-color: #ff6b35;
        }

        button {
            padding: 0.85rem 1.75rem;
            background: #ff6b35;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #e5572a; }

        .compare-link {
            margin-top: 1.5rem;
            color: #666;
            font-size: 0.9rem;
        }

        .compare-link a {
            color: #ff6b35;
            text-decoration: none;
        }

        .compare-link a:hover { text-decoration: underline; }

        .loading {
            display: none;
            margin-top: 1.5rem;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="logo">Brand-Pulse</div>
    <div class="tagline">Reddit sentiment analysis for any brand</div>

    <form action="/search" method="POST" onsubmit="showLoading()">
        <input type="text" name="brand" placeholder="Enter a brand name (e.g. Nike)" required autofocus>
        <button type="submit">Analyze</button>
    </form>

    <div class="loading" id="loading">
        ⏳ Scraping Reddit... this may take 30–60 seconds
    </div>

    <div class="compare-link">
        Want to compare two brands? <a href="/compare">Try Compare →</a>
    </div>

    <script>
        function showLoading() {
            document.getElementById("loading").style.display = "block";
        }
    </script>

</body>
</html>
